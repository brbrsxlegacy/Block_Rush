<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crystal Rush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 background:linear-gradient(135deg,#0b1020,#111827);
 font-family:Arial,sans-serif;
 color:#fff;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 overflow:hidden;
}
#game{
 width:min(95vw,430px);
 height:min(95vh,900px);
 background:#111827;
 border-radius:28px;
 padding:18px;
 box-shadow:0 0 50px rgba(0,0,0,.5);
}
h1{text-align:center;font-size:48px;margin-bottom:12px}
#scorebar{
 display:flex;
 justify-content:space-between;
 margin-bottom:12px;
}
.pill{
 background:#1f2937;
 padding:10px 16px;
 border-radius:18px;
 font-weight:bold;
}
#rush{
 width:100%;
 height:18px;
 background:#1f2937;
 border-radius:999px;
 margin-bottom:16px;
 overflow:hidden;
}
#rushFill{
 width:0%;
 height:100%;
 background:linear-gradient(90deg,cyan,purple,pink);
}
#board{
 position:relative;
 width:100%;
 aspect-ratio:1;
}
.cell{
 position:absolute;
 width:48px;
 height:48px;
 transform:rotate(45deg);
 border-radius:10px;
 background:#1e293b;
}
.filled{
 background:linear-gradient(135deg,var(--c1),var(--c2));
 box-shadow:0 0 16px var(--c1);
}
#inventory{
 display:flex;
 justify-content:space-around;
 margin-top:25px;
}
.slot{
 width:80px;
 height:80px;
 background:#1f2937;
 border-radius:20px;
 display:flex;
 justify-content:center;
 align-items:center;
}
.mini{
 width:24px;
 height:24px;
 transform:rotate(45deg);
 border-radius:6px;
 background:red;
}
</style>
</head>
<body>
<div id="game">
<h1>CRYSTAL RUSH</h1>

<div id="scorebar">
<div class="pill">Score: <span id="score">0</span></div>
<div class="pill">Chain: <span id="chain">0</span></div>
</div>

<div id="rush"><div id="rushFill"></div></div>

<div id="board"></div>

<div id="inventory">
<div class="slot" id="slot0"></div>
<div class="slot" id="slot1"></div>
<div class="slot" id="slot2"></div>
</div>

<script>
  const boardEl=document.getElementById("board");
const scoreEl=document.getElementById("score");
const chainEl=document.getElementById("chain");
const rushFill=document.getElementById("rushFill");

const N=7;
let board=[];
let score=0;
let chain=0;
let rush=0;

const colors=[
 ["#22d3ee","#2563eb"],
 ["#f472b6","#be185d"],
 ["#a78bfa","#7c3aed"],
 ["#fde047","#f97316"],
 ["#4ade80","#15803d"]
];

function inDiamond(x,y){
 const c=Math.floor(N/2);
 return Math.abs(x-c)+Math.abs(y-c)<=c;
}

function initBoard(){
 board=Array.from({length:N},()=>Array(N).fill(null));
 drawBoard();
}

function drawBoard(){
 boardEl.innerHTML="";
 const size=100/N;

 for(let y=0;y<N;y++){
  for(let x=0;x<N;x++){
   if(!inDiamond(x,y)) continue;

   const cell=document.createElement("div");
   cell.className="cell";
   cell.style.left=`calc(${x*size}% + 3px)`;
   cell.style.top=`calc(${y*size}% + 3px)`;

   if(board[y][x]!==null){
    cell.classList.add("filled");
    cell.style.setProperty("--c1",colors[board[y][x]][0]);
    cell.style.setProperty("--c2",colors[board[y][x]][1]);
   }

   cell.onclick=()=>placeCrystal(x,y);
   boardEl.appendChild(cell);
  }
 }
}

function placeCrystal(x,y){
 if(board[y][x]!==null) return;

 const color=Math.floor(Math.random()*colors.length);
 board[y][x]=color;

 score+=5;
 scoreEl.textContent=score;

 resolveMerges();
 drawBoard();
}

function neighbors(x,y){
 return [
  [x+1,y],
  [x-1,y],
  [x,y+1],
  [x,y-1]
 ].filter(([nx,ny]) =>
   nx>=0&&nx<N&&ny>=0&&ny<N&&inDiamond(nx,ny)
 );
}

function findGroups(){
 let seen=Array.from({length:N},()=>Array(N).fill(false));
 let groups=[];

 for(let y=0;y<N;y++){
  for(let x=0;x<N;x++){
   if(!inDiamond(x,y)) continue;
   if(board[y][x]===null||seen[y][x]) continue;

   let color=board[y][x];
   let stack=[[x,y]];
   let group=[];
   seen[y][x]=true;

   while(stack.length){
    let [cx,cy]=stack.pop();
    group.push([cx,cy]);

    for(const [nx,ny] of neighbors(cx,cy)){
     if(!seen[ny][nx] && board[ny][nx]===color){
      seen[ny][nx]=true;
      stack.push([nx,ny]);
     }
    }
   }

   if(group.length>=4){
    groups.push(group);
   }
  }
 }
 return groups;
}

function resolveMerges(){
 const groups=findGroups();

 if(groups.length===0){
  chain=0;
  chainEl.textContent=chain;
  return;
 }

 chain++;
 chainEl.textContent=chain;

 groups.forEach(group=>{
  const mid=group[Math.floor(group.length/2)];

  group.forEach(([x,y])=>{
   board[y][x]=null;
  });

  board[mid[1]][mid[0]]=Math.floor(Math.random()*colors.length);

  score+=group.length*20*chain;
  rush+=group.length*6;
 });

 scoreEl.textContent=score;
 rushFill.style.width=Math.min(rush,100)+"%";

 if(rush>=100){
  rushBlast();
 }

 setTimeout(()=>{
  drawBoard();
  resolveMerges();
 },200);
}

  
function rushBlast(){
 rush=0;
 rushFill.style.width="0%";

 const center=Math.floor(N/2);

 for(let y=0;y<N;y++){
  for(let x=0;x<N;x++){
   if(!inDiamond(x,y)) continue;

   const dist=Math.abs(x-center)+Math.abs(y-center);

   if(dist<=2){
    if(board[y][x]!==null){
      board[y][x]=null;
      score+=30;
    }
   }
  }
 }

 scoreEl.textContent=score;
 drawBoard();
}

function hasMoves(){
 for(let y=0;y<N;y++){
  for(let x=0;x<N;x++){
   if(!inDiamond(x,y)) continue;
   if(board[y][x]===null) return true;
  }
 }
 return false;
}

function gameOver(){
 alert("Game Over! Score: " + score);
 restart();
}

function restart(){
 score=0;
 chain=0;
 rush=0;

 scoreEl.textContent=0;
 chainEl.textContent=0;
 rushFill.style.width="0%";

 initBoard();
}

initBoard();

setInterval(()=>{
 if(!hasMoves()){
   gameOver();
 }
},500);

</script>
</body>
</html>
